  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./dist

      # 长等待，缓解前面删release/tag带来的API压力
      - name: Pre wait to avoid secondary rate limit
        run: sleep 12

      # 清理旧Release+tag
      - name: Purge old release & tag
        env:
          GH_TOKEN: ${{ secrets.GH_RELEASE_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set +e
          gh release view "$TAG" >/dev/null 2>&1 && gh release delete "$TAG" --cleanup-tag -y
          git tag -d "$TAG" 2>/dev/null
          git push origin --delete "$TAG" 2>/dev/null
          set -e
          # 再次等待API同步
          sleep 10

      # 1. 先创建空Release，不上传文件
      - name: Create empty release
        env:
          GH_TOKEN: ${{ secrets.GH_RELEASE_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            --generate-notes \
            --title "Release $TAG"

      # 2. 串行逐个上传文件，带限流重试+强制延迟（关键防次级限流）
      - name: Upload assets one by one with throttle
        env:
          GH_TOKEN: ${{ secrets.GH_RELEASE_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          MAX_RETRY=3
          DELAY_PER_FILE=2
          # 遍历dist下所有文件
          find ./dist -type f | while read -r file; do
            echo "Uploading: $file"
            attempt=1
            success=0
            while [ $attempt -le $MAX_RETRY ]; do
              if gh release upload "$TAG" "$file" --clobber; then
                success=1
                break
              fi
              echo "Rate limited or failed, retry $attempt after 30s..."
              sleep 30
              attempt=$((attempt + 1))
            done
            if [ $success -ne 1 ]; then
              echo "FATAL: upload $file failed after $MAX_RETRY retries"
              exit 1
            fi
            # 每个文件上传完成强制等待2秒，压平请求峰值
            sleep $DELAY_PER_FILE
          done